name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-build-docker:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: attendance_app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d attendance_app_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      JWT_SECRET: test_secret_for_ci
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/attendance_app_test?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate deploy (test DB)
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Docker build
        run: docker build -t evidencija-zap:ci .
